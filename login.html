<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Painel Administrativo IPDA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="img/favicon.jpg" type="image/jpeg">
    <link rel="stylesheet" href="style/style.css">
    <style>
        .container-login {
            max-width: 480px !important;
            padding: 40px 30px !important;
        }

        .login-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .login-header img {
            width: 150px;
            margin-bottom: 15px;
        }

        .login-header h1 {
            font-size: 24px;
            color: #24348c;
            margin-bottom: 5px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .btn-login {
            margin-top: 15px;
            width: 100%;
        }

        .erro-mensagem {
            background-color: #fde8e8;
            color: #e53e3e;
            border: 1px solid #f8b4b4;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            display: none;
        }
    </style>
</head>

<body>
    <div class="container container-login">
        <div class="login-header">
            <img src="img/logo.png" alt="Logo IPDA">
            <h1>Painel Administrativo</h1>
            <p>Faça login para acessar os relatórios patrimoniais</p>
        </div>

        <div id="erro-container" class="erro-mensagem">
            Usuário ou senha incorretos.
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" placeholder="Digite seu usuário" required autocomplete="username" autofocus>
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="Digite sua senha" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-login">Acessar Painel</button>
        </form>

        <footer class="footer" style="margin-top: 30px; padding-top: 15px;">
            <p><a href="index.html">← Voltar ao cadastro</a></p>
            <p>Rua Alexandre Levi, 50 - Cambuci - SP</p>
        </footer>
    </div>

    <script>
        // ==========================================
        // CONFIGURAÇÃO DO USUÁRIO E SENHA DE ACESSO
        // ==========================================
        const CREDENCIAIS_ACESSO = {
            "gestaodedados@ipda.com.br": "@admgd2026",
            "admin": "@admgd2026",
            "supervisor.mg": "@admgd2026",
            "supervisor.nd": "@admgd2026",
            "supervisor.nt": "@admgd2026",
            "supervisor.rj": "@admgd2026",
            "supervisor.mg": "@admgd2026",
            "supervisor.co": "@admgd2026"
        };

        // Objeto de mapeamento RBAC para controle de acesso por perfil e regiões (multi-regiões)
        const USUARIOS_RBAC = {
            "gestaodedados@ipda.com": { perfil: "Admin", regioes: ["Todas"] },
            "admin": { perfil: "Admin", regioes: ["Todas"] },
            "supervisor.mg": { perfil: "Supervisor", regioes: ["Minas Gerais"] },
            "supervisor.nd": { perfil: "Supervisor", regioes: ["Nordeste"] },
            "supervisor.nt": { perfil: "Supervisor", regioes: ["Norte"] },
            "supervisor.rj": { perfil: "Supervisor", regioes: ["Rio de Janeiro","Centro-Oeste", "Espirito Santo"] },
            "supervisor.sul": { perfil: "Supervisor", regioes: ["Regiao Sul"] },
            "supervisor.sp": { perfil: "Supervisor", regioes: ["Grande Sao Paulo - SP", "Interior - SP","Litoral - SP"] }
        };

        const form = document.getElementById("login-form");
        const usernameInput = document.getElementById("username");
        const passwordInput = document.getElementById("password");
        const erroContainer = document.getElementById("erro-container");

        // Se já estiver logado, redireciona direto
        if (sessionStorage.getItem("usuarioLogado") === "true") {
            window.location.href = "relatorios.html";
        }

        form.addEventListener("submit", function (e) {
            e.preventDefault();
            erroContainer.style.display = "none";

            const usernameVal = usernameInput.value.trim().toLowerCase();
            const passwordVal = passwordInput.value;

            // Validação das credenciais configuráveis via RBAC
            if (CREDENCIAIS_ACESSO[usernameVal] && passwordVal === CREDENCIAIS_ACESSO[usernameVal]) {
                sessionStorage.setItem("usuarioLogado", "true");

                const rbac = USUARIOS_RBAC[usernameVal] || { perfil: "Admin", regioes: ["Todas"] };
                sessionStorage.setItem("usuarioPerfil", rbac.perfil);
                sessionStorage.setItem("usuarioRegioes", JSON.stringify(rbac.regioes));

                // Redireciona para os relatórios
                window.location.href = "relatorios.html";
            } else {
                erroContainer.style.display = "block";
                passwordInput.value = "";
                passwordInput.focus();
            }
        });
    </script>
</body>

</html>
